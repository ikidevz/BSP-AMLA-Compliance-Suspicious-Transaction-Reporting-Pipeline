bsp_aml_postgres:
  outputs:
    dev:
      type: postgres
      host: "{{ env_var('DBT_POSTGRES_HOST', 'postgres') }}"
      user: "{{ env_var('DBT_POSTGRES_USER', 'aml_pipeline') }}"
      pass: "{{ env_var('DBT_POSTGRES_PASSWORD', 'aml_pipeline_pwd') }}"
      port: "{{ env_var('DBT_POSTGRES_PORT', 5432) | as_number }}"
      dbname: "{{ env_var('DBT_POSTGRES_DBNAME', 'aml_compliance_db') }}"
      schema: "{{ env_var('DBT_SCHEMA', 'bronze') }}"
      threads: 4
      keepalives_idle: 0
      connect_timeout: 10

    prod:
      type: postgres
      host: "{{ env_var('DBT_POSTGRES_HOST', 'postgres') }}"
      user: "{{ env_var('DBT_POSTGRES_USER', 'aml_pipeline') }}"
      pass: "{{ env_var('DBT_POSTGRES_PASSWORD', 'aml_pipeline_pwd') }}"
      port: "{{ env_var('DBT_POSTGRES_PORT', 5432) | as_number }}"
      dbname: "{{ env_var('DBT_POSTGRES_DBNAME', 'aml_compliance_db') }}"
      schema: "{{ env_var('DBT_SCHEMA', 'bronze') }}"
      threads: 8
      keepalives_idle: 0
      connect_timeout: 10

  target: dev
